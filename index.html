<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIUS Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900">


     <!-- Navbar -->
    <header class="w-full shadow-sm sticky top-0 bg-white z-50">
        <div class="container mx-auto flex items-center justify-between py-4 px-6">
            <h1 href="index.html" class="text-3xl font-bold tracking-tight">MIUS</h1>
            <nav class="space-x-6 hidden md:block">
                <a href="men.html" class="hover:text-gray-600">Men</a>
                <a href="all_pro_page.html" class="hover:text-gray-600">Women</a>
                <a href="all_pro_page.html" class="hover:text-gray-600">Kids</a>
                <a href="all_pro_page.html" class="hover:text-gray-600">New Arrivals</a>
            </nav>
            <div class="flex items-center space-x-5">
                <button class="hover:text-gray-600">Search</button>
                <button class="hover:text-gray-600">Account</button>
               <button onclick="window.location.href='Checkout_Page.html'" class="hover:text-gray-600">Cart</button>
            </div>
        </div>
    </header>


    <!-- Hero Banner -->
    <section class="relative w-full h-[500px] bg-cover bg-center" style="background-image: url('https://images.pexels.com/photos/6311653/pexels-photo-6311653.jpeg');">
        <div class="absolute inset-0 bg-black/30"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="text-center text-white">
                <h2 class="text-5xl font-bold">New Season Essentials</h2>
                <p class="mt-4 text-lg">Minimal • Stylish • Comfortable</p>
                <button class="mt-6 px-6 py-3 bg-white text-black rounded-md font-semibold hover:bg-gray-200">Shop Now</button>
            </div>
        </div>
    </section>


    <!-- Category Grid -->
    <section class="container mx-auto px-6 py-16">
        <h2 class="text-3xl font-bold mb-8">Shop by Category</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="relative h-80 bg-cover bg-center rounded-lg overflow-hidden" style="background-image: url('https://images.pexels.com/photos/7679725/pexels-photo-7679725.jpeg');">
                <div class="absolute inset-0 bg-black/20 flex items-end p-4">
                    <h3 class="text-white text-xl font-semibold">Men</h3>
                </div>
            </div>
            <div class="relative h-80 bg-cover bg-center rounded-lg overflow-hidden" style="background-image: url('https://images.pexels.com/photos/6311505/pexels-photo-6311505.jpeg');">
                <div class="absolute inset-0 bg-black/20 flex items-end p-4">
                    <h3 class="text-white text-xl font-semibold">Women</h3>
                </div>
            </div>
            <div class="relative h-80 bg-cover bg-center rounded-lg overflow-hidden" style="background-image: url('https://images.pexels.com/photos/8764971/pexels-photo-8764971.jpeg');">
                <div class="absolute inset-0 bg-black/20 flex items-end p-4">
                    <h3 class="text-white text-xl font-semibold">Kids</h3>
                </div>
            </div>
        </div>
    </section>
    

    <!-- Featured Products -->
    <section class="container mx-auto px-6 py-16">
        <h2 class="text-3xl font-bold mb-8">New Arrivals</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-8">
            <div class="border p-4 rounded-lg hover:shadow-lg transition">
                <img src="https://images.pexels.com/photos/6311395/pexels-photo-6311395.jpeg" class="w-full h-64 object-cover rounded-md" />
                <h3 class="mt-4 text-lg font-semibold">Oversized T-Shirt</h3>
                <p class="text-gray-600">৳ 850</p>
                <button class="mt-3 w-full py-2 bg-black text-white rounded-md">Add to Cart</button>
            </div>
            <div class="border p-4 rounded-lg hover:shadow-lg transition">
                <img src="https://images.pexels.com/photos/6311385/pexels-photo-6311385.jpeg" class="w-full h-64 object-cover rounded-md" />
                <h3 class="mt-4 text-lg font-semibold">Casual Shirt</h3>
                <p class="text-gray-600">৳ 1250</p>
                <button class="mt-3 w-full py-2 bg-black text-white rounded-md">Add to Cart</button>
            </div>
            <div class="border p-4 rounded-lg hover:shadow-lg transition">
                <img src="https://images.pexels.com/photos/7679723/pexels-photo-7679723.jpeg" class="w-full h-64 object-cover rounded-md" />
                <h3 class="mt-4 text-lg font-semibold">Polo Shirt</h3>
                <p class="text-gray-600">৳ 950</p>
                <button class="mt-3 w-full py-2 bg-black text-white rounded-md">Add to Cart</button>
            </div>
            <div class="border p-4 rounded-lg hover:shadow-lg transition">
                <img src="https://images.pexels.com/photos/7048069/pexels-photo-7048069.jpeg" class="w-full h-64 object-cover rounded-md" />
                <h3 class="mt-4 text-lg font-semibold">Basic Hoodie</h3>
                <p class="text-gray-600">৳ 1450</p>
                <button class="mt-3 w-full py-2 bg-black text-white rounded-md">Add to Cart</button>
            </div>
        </div>
    </section>


    <!-- Footer -->
    <footer class="bg-black text-white text-center py-6">
        <p>© 2026 MIUS — All Rights Reserved by si4m</p>
    </footer>
</body>
</html>
