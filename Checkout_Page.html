               <button onclick="window.location.href='Checkout_Page.html'" class="hover:text-gray-600">Cart</button>
            </div>
        </div>
    </header>

    <!-- Checkout Table -->
    <section class="container mx-auto px-6 py-10">
        <h2 class="text-3xl font-bold mb-6">Your Cart / Checkout</h2>

        <div class="overflow-x-auto">
            <table class="min-w-full bg-white rounded-lg shadow">
                <thead class="bg-gray-200 text-gray-700">
                    <tr>
                        <th class="py-3 px-6 text-left">Product</th>
                        <th class="py-3 px-6 text-left">Price</th>
                        <th class="py-3 px-6 text-left">Quantity</th>
                        <th class="py-3 px-6 text-left">Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Example Item 1 -->
                    <tr class="border-b">
                        <td class="py-4 px-6 flex items-center space-x-4">
                            <img src="https://images.pexels.com/photos/6311395/pexels-photo-6311395.jpeg" class="w-16 h-16 object-cover rounded">
                            <span>Oversized T-Shirt</span>
                        </td>
                        <td class="py-4 px-6">৳ 850</td>
                        <td class="py-4 px-6">2</td>
                        <td class="py-4 px-6">৳ 1700</td>
                    </tr>

                    <!-- Example Item 2 -->
                    <tr class="border-b">
                        <td class="py-4 px-6 flex items-center space-x-4">
                            <img src="https://images.pexels.com/photos/6311385/pexels-photo-6311385.jpeg" class="w-16 h-16 object-cover rounded">
                            <span>Casual Shirt</span>
                        </td>
                        <td class="py-4 px-6">৳ 1250</td>
                        <td class="py-4 px-6">1</td>
                        <td class="py-4 px-6">৳ 1250</td>
                    </tr>

                    <!-- Total -->
                    <tr>
                        <td colspan="3" class="py-4 px-6 text-right font-bold">Total:</td>
                        <td class="py-4 px-6 font-bold">৳ 2950</td>
                    </tr>
                </tbody>
            </table>
        </div>

 <!-- Billing Form -->
        <div class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-md">
            <h2 class="text-3xl font-bold mb-6">Checkout</h2>

            <h3 class="font-semibold text-xl mb-4">Billing Details</h3>

            <form class="grid grid-cols-1 md:grid-cols-2 gap-5">

                <div>
                    <label class="font-medium">Full Name</label>
                    <input type="text" class="w-full border px-4 py-2 rounded-md mt-1" placeholder="Your Name" />
                </div>

                <div>
                    <label class="font-medium">Phone Number</label>
                    <input type="text" class="w-full border px-4 py-2 rounded-md mt-1" placeholder="01XXXXXXXXX" />
                </div>

                <div class="md:col-span-2">
                    <label class="font-medium">Full Address</label>
                    <textarea class="w-full border px-4 py-2 rounded-md mt-1" rows="3" placeholder="House, Road, Area"></textarea>
                </div>

                <div>
                    <label class="font-medium">City</label>
                    <input type="text" class="w-full border px-4 py-2 rounded-md mt-1" placeholder="Dhaka, Chittagong..." />
                </div>

                <div>
                    <label class="font-medium">Postal Code</label>
                    <input type="text" class="w-full border px-4 py-2 rounded-md mt-1" placeholder="1200" />
                </div>

                <div class="md:col-span-2">
                    <label class="font-medium">Payment Method</label>
                    <select class="w-full border px-4 py-2 rounded-md mt-1">
                        <option>Cash on Delivery</option>
                        <option>bKash Payment</option>
                        <option>Nagad Payment</option>
                        <option>Rocket Payment</option>
                    </select>
                </div>
            </form>


            <button class="w-full bg-black text-white py-3 rounded-xl text-lg font-semibold hover:bg-gray-800">
                Place Order
            </button>

        </div>

    <!-- Footer -->
   <footer class="bg-black text-white text-center py-6">
